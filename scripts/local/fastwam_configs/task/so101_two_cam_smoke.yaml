# @package _global_

defaults:
  - override /data: so101_two_cam
  - override /model: fastwam
  - _self_

output_dir: ./runs/train/so101_two_cam_smoke
batch_size: 1
num_workers: 0

model:
  mot_checkpoint_mixed_attn: false

lr_scheduler_type: "cosine"
learning_rate: 1.0e-4
num_epochs: 1
max_steps: 2
log_every: 1
save_every: 0
eval_every: 0
eval_num_inference_steps: 2

gradient_accumulation_steps: 1
mixed_precision: "bf16"
trainable_scope: "dit"
weight_decay: 1.0e-2
resume: null

wandb:
  enabled: false
